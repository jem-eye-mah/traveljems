<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Travel Jems — Blog</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root{--black:#07080A;--ink:#0C0E12;--surface:#121520;--muted:#1E2230;--cream:#EEE9DF;--warm:#C0B49A;--gold:#C8A35A;--gold2:#E2C07A;--diamond:#7EB8D4;--ice:#B8D8EC;--azure:#2E6BAF;--serif:'Cormorant Garamond',Georgia,serif;--sans:'Jost',sans-serif;--ease:cubic-bezier(.4,0,.2,1);}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;}
  body{background:var(--black);color:var(--cream);font-family:var(--sans);font-weight:300;overflow-x:hidden;cursor:none;}
  ::-webkit-scrollbar{width:3px;}
  ::-webkit-scrollbar-thumb{background:linear-gradient(to bottom,var(--gold),var(--diamond));}
  .cursor{position:fixed;z-index:9999;pointer-events:none;width:10px;height:10px;background:var(--diamond);border-radius:50%;transform:translate(-50%,-50%);mix-blend-mode:screen;}
  .cursor-ring{position:fixed;z-index:9998;pointer-events:none;width:36px;height:36px;border:1px solid var(--diamond);border-radius:50%;transform:translate(-50%,-50%);opacity:.4;}

  nav{display:flex;align-items:center;justify-content:space-between;padding:1.5rem 3rem;border-bottom:1px solid rgba(126,184,212,.08);position:sticky;top:0;z-index:100;background:rgba(7,8,10,.95);backdrop-filter:blur(14px);}
  .nav-logo{font-family:var(--serif);font-size:1.4rem;font-weight:500;letter-spacing:.12em;color:var(--cream);text-decoration:none;cursor:none;}
  .nav-logo span{color:var(--gold);}
  .nav-back{font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:var(--diamond);text-decoration:none;display:inline-flex;align-items:center;gap:.4rem;cursor:none;transition:gap .3s,color .3s;}
  .nav-back:hover{gap:.7rem;color:var(--ice);}

  .post-hero{position:relative;min-height:60vh;display:flex;align-items:flex-end;overflow:hidden;padding:0;}
  .post-hero-bg{position:absolute;inset:0;background:linear-gradient(160deg,#1B3A6B,#0d1520,#2A1A0d);background-size:cover;background-position:center;}
  .post-hero-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(7,8,10,.95) 0%,rgba(7,8,10,.3) 60%);}
  .post-hero-content{position:relative;z-index:1;padding:4rem 3rem;max-width:800px;}
  .post-tag{font-size:.62rem;letter-spacing:.35em;text-transform:uppercase;background:linear-gradient(to right,var(--gold),var(--diamond));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:1rem;}
  .post-title{font-family:var(--serif);font-size:clamp(2rem,5vw,3.8rem);font-weight:300;line-height:1.1;color:var(--cream);margin-bottom:1rem;}
  .post-meta{font-size:.68rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(184,216,236,.5);}

  .post-body{max-width:720px;margin:0 auto;padding:4rem 3rem;}
  .post-body p{color:var(--warm);line-height:1.95;font-size:1rem;margin-bottom:1.5rem;}
  .post-body h2{font-family:var(--serif);font-size:1.8rem;font-weight:300;color:var(--cream);margin:2.5rem 0 1rem;}
  .post-body h3{font-family:var(--serif);font-size:1.3rem;font-weight:300;color:var(--gold2);margin:2rem 0 .8rem;}
  .post-body ul,.post-body ol{color:var(--warm);padding-left:1.5rem;margin-bottom:1.5rem;line-height:1.9;}
  .post-body li{margin-bottom:.4rem;}
  .post-body strong{color:var(--cream);font-weight:500;}
  .post-body em{color:var(--gold2);}
  .post-body blockquote{border-left:2px solid var(--diamond);padding-left:1.5rem;margin:2rem 0;font-family:var(--serif);font-size:1.2rem;font-style:italic;color:var(--ice);line-height:1.7;}
  .post-body a{color:var(--diamond);text-decoration:none;border-bottom:1px solid rgba(126,184,212,.3);transition:border-color .3s;}
  .post-body a:hover{border-color:var(--diamond);}
  .post-body img{width:100%;margin:2rem 0;display:block;}
  .post-body hr{border:none;border-top:1px solid rgba(126,184,212,.1);margin:2.5rem 0;}

  .post-footer{max-width:720px;margin:0 auto;padding:0 3rem 4rem;}
  .post-divider{height:1px;background:linear-gradient(to right,var(--gold),var(--diamond),transparent);margin-bottom:2rem;}
  .post-share{display:flex;align-items:center;gap:1rem;flex-wrap:wrap;}
  .share-label{font-size:.65rem;letter-spacing:.25em;text-transform:uppercase;color:var(--warm);}
  .share-btn{font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:var(--diamond);border:1px solid rgba(126,184,212,.2);padding:.4rem .9rem;text-decoration:none;cursor:none;transition:all .3s;background:none;}
  .share-btn:hover{border-color:var(--diamond);background:rgba(126,184,212,.08);}

  .related-section{background:var(--surface);padding:4rem 3rem;}
  .related-title{font-family:var(--serif);font-size:1.8rem;font-weight:300;margin-bottom:2rem;}
  .related-title em{font-style:italic;color:var(--gold2);}
  .related-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;background:rgba(126,184,212,.05);}
  .related-card{background:var(--surface);padding:2rem;text-decoration:none;display:block;transition:background .3s;position:relative;overflow:hidden;cursor:none;}
  .related-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(to right,var(--gold),var(--diamond));transform:scaleX(0);transform-origin:left;transition:transform .4s var(--ease);}
  .related-card:hover::before{transform:scaleX(1);}
  .related-card:hover{background:var(--muted);}
  .related-tag{font-size:.55rem;letter-spacing:.3em;text-transform:uppercase;background:linear-gradient(to right,var(--gold),var(--diamond));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:.5rem;}
  .related-card-title{font-family:var(--serif);font-size:1.2rem;font-weight:300;color:var(--cream);line-height:1.3;}

  .not-found{text-align:center;padding:8rem 3rem;}
  .not-found h2{font-family:var(--serif);font-size:2rem;font-weight:300;margin-bottom:1rem;color:var(--cream);}
  .not-found p{color:var(--warm);margin-bottom:2rem;}

  @media(max-width:768px){
    nav{padding:1rem 1.5rem;}
    .post-hero-content{padding:3rem 1.5rem;}
    .post-body,.post-footer{padding-left:1.5rem;padding-right:1.5rem;}
    .related-section{padding:3rem 1.5rem;}
    .related-grid{grid-template-columns:1fr;}
  }
</style>
</head>
<body>
<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<nav>
  <a href="index.html" class="nav-logo">TRAVEL <span>JEMS</span></a>
  <a href="index.html#blog" class="nav-back">← Back to blog</a>
</nav>

<div id="postContent">
  <!-- Loading state -->
  <div class="not-found">
    <h2>Loading<em>...</em></h2>
    <p>Fetching the story for you ◆</p>
  </div>
</div>

<div class="related-section" id="relatedSection" style="display:none;">
  <h2 class="related-title">More from the <em>journal</em></h2>
  <div class="related-grid" id="relatedGrid"></div>
</div>

<script>
// Cursor
const cursor=document.getElementById('cursor'),ring=document.getElementById('cursorRing');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;});
(function a(){rx+=(mx-rx)*.15;ry+=(my-ry)*.15;cursor.style.left=mx+'px';cursor.style.top=my+'px';ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(a);})();

// Get slug from URL
const params=new URLSearchParams(window.location.search);
const slug=params.get('slug');

async function loadPost(){
  const container=document.getElementById('postContent');
  if(!slug){showNotFound(container);return;}
  try{
    const r=await fetch('/_data/posts.json');
    if(!r.ok)throw new Error();
    const {posts}=await r.json();
    const post=posts.find(p=>p.slug===slug||p.slug.endsWith(slug));
    if(!post){showNotFound(container);return;}

    document.title=`${post.title} — Travel Jems`;
    const fmt=d=>new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});
    const heroBg=post.image?`background-image:url('${post.image}');background-size:cover;background-position:center;`:'';

    container.innerHTML=`
      <div class="post-hero">
        <div class="post-hero-bg" style="${heroBg}"></div>
        <div class="post-hero-overlay"></div>
        <div class="post-hero-content">
          <div class="post-tag">${post.region}</div>
          <h1 class="post-title">${post.title}</h1>
          <div class="post-meta">${fmt(post.date)}</div>
        </div>
      </div>
      <article class="post-body">${post.body}</article>
      <div class="post-footer">
        <div class="post-divider"></div>
        <div class="post-share">
          <span class="share-label">Share this story</span>
          <button class="share-btn" onclick="copyLink()">Copy link</button>
          <a class="share-btn" href="https://twitter.com/intent/tweet?text=${encodeURIComponent(post.title)}&url=${encodeURIComponent(window.location.href)}" target="_blank">Twitter / X</a>
        </div>
      </div>`;

    // Related posts
    const related=posts.filter(p=>p.slug!==post.slug).slice(0,3);
    if(related.length>0){
      document.getElementById('relatedSection').style.display='block';
      document.getElementById('relatedGrid').innerHTML=related.map(p=>`
        <a href="post.html?slug=${p.slug}" class="related-card">
          <div class="related-tag">${p.region}</div>
          <div class="related-card-title">${p.title}</div>
        </a>`).join('');
    }
  }catch(e){showNotFound(container);}
}

function showNotFound(c){
  c.innerHTML=`<div class="not-found"><h2>Story not <em>found</em></h2><p>This post may not exist yet — check back soon.</p><a href="index.html#blog" style="color:var(--diamond);text-decoration:none;font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;">← Back to blog</a></div>`;
}

function copyLink(){
  navigator.clipboard.writeText(window.location.href).then(()=>{
    const btn=document.querySelector('.share-btn');
    btn.textContent='✓ Copied!';
    setTimeout(()=>btn.textContent='Copy link',2000);
  });
}

loadPost();
</script>
</body>
</html>
